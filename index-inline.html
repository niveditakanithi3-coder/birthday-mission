<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday Mission 🎉</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Fredoka One', cursive, sans-serif;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fad0c4, #ffd1ff, #a18cd1);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            touch-action: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .screen {
            pointer-events: auto;
            text-align: center;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            transform: scale(1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            color: #ffffff;
            font-size: 2.8rem;
            margin-bottom: 20px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
            letter-spacing: 1px;
        }

        h2 {
            color: #ffffff;
            font-size: 2.2rem;
            margin-top: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        p {
            color: #fff;
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .controls-info {
            margin: 25px 0;
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        button {
            background: linear-gradient(45deg, #ff6b81, #ff4757);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.6rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Fredoka One', cursive, sans-serif;
            box-shadow: 0 10px 20px rgba(255, 107, 129, 0.4);
            transition: all 0.2s ease;
            border: 3px solid rgba(255, 255, 255, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(255, 107, 129, 0.6);
            filter: brightness(1.1);
        }

        button:active {
            transform: scale(0.95);
            box-shadow: 0 5px 10px rgba(255, 107, 129, 0.4);
        }

        #hud-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            border: none !important;
            padding: 25px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 1.8rem;
            color: #fff;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        #score-display {
            font-weight: bold;
            color: #fff;
            background: rgba(255, 107, 129, 0.8);
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px solid #fff;
        }

        #level-display {
            background: rgba(30, 144, 255, 0.8);
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px solid #fff;
        }

        .toast {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 165, 2, 0.8);
            pointer-events: none;
        }

        @keyframes fadeOut {
            0% { opacity: 0; transform: translate(-50%, 20px) scale(0.5); }
            15% { opacity: 1; transform: translate(-50%, 0) scale(1.2); }
            25% { transform: translate(-50%, 0) scale(1); }
            80% { opacity: 1; transform: translate(-50%, -10px) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50px) scale(0.8); }
        }

        .bounce {
            animation: bounce 1s infinite alternate cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-15px); }
        }

        .shimmer {
            background: linear-gradient(90deg, #ffffff, #ffa502, #7bed9f, #1e90ff, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 2s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            h2 { font-size: 1.8rem; }
            .screen { padding: 25px; }
            button { padding: 12px 25px; font-size: 1.2rem; }
            .hud-top { font-size: 1.2rem; }
            .toast { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui-layer">
            <div id="start-screen" class="screen">
                <h1>Birthday Mission 🎉</h1>
                <p>Catch 5 items to pass each level!</p>
                <div class="controls-info">
                    <p>🖥️ Arrow Keys</p>
                    <p>📱 Touch and Drag</p>
                </div>
                <button id="start-btn">Start Mission</button>
            </div>

            <div id="hud-screen" class="screen hidden">
                <div class="hud-top">
                    <div id="level-display">Level 1</div>
                    <div id="score-display">0 / 5</div>
                </div>
                <div id="level-title-toast" class="toast hidden">LEVEL 1</div>
            </div>

            <div id="end-screen" class="screen hidden">
                <h1 class="shimmer bounce" style="font-size: 2.5rem; margin-bottom: 10px;">MISSION COMPLETE 🎉</h1>
                <h2 class="shimmer bounce" style="font-size: 2.8rem; margin-bottom: 20px;">HAPPY BIRTHDAY ABBU!</h2>
                <button id="restart-btn" style="margin-top: 30px;">Play Again</button>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const startScreen = document.getElementById('start-screen');
        const hudScreen = document.getElementById('hud-screen');
        const endScreen = document.getElementById('end-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const levelDisplay = document.getElementById('level-display');
        const scoreDisplay = document.getElementById('score-display');
        const levelToast = document.getElementById('level-title-toast');

        let animationId;
        let gameState = 'start';
        let currentLevel = 1;
        let score = 0;
        let items = [];
        let particles = [];
        let frameCount = 0;
        let shakeAmount = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const player = {
            x: canvas.width / 2,
            y: canvas.height - 100,
            width: 80,
            height: 70,
            speed: 12,
            dx: 0
        };

        const keys = {
            ArrowLeft: false,
            ArrowRight: false
        };

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = true;
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = false;
        });

        canvas.addEventListener('touchstart', handleTouch, { passive: false });
        canvas.addEventListener('touchmove', handleTouch, { passive: false });

        function handleTouch(e) {
            if (gameState !== 'play') return;
            e.preventDefault();
            const touch = e.touches[0];
            const targetX = touch.clientX - player.width / 2;
            player.x += (targetX - player.x) * 0.2;
        }

        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'catch') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
                shakeAmount = 5;
            } else if (type === 'levelUp') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.setValueAtTime(554.37, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.2);
                osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            } else if (type === 'win') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.2);
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.4);
                osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.6);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 1.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 1.2);
            }
        }

        const levels = {
            1: { emoji: '🎂', baseSpeed: 4, target: 5, wave: false },
            2: { emoji: '🎁', baseSpeed: 7, target: 5, wave: false },
            3: { emoji: '🎈', baseSpeed: 5, target: 5, wave: true }
        };

        function spawnItem() {
            const config = levels[currentLevel];
            const speedScale = canvas.height / 600; 
            const speedY = (config.baseSpeed + Math.random() * 2) * speedScale;
            const x = Math.random() * (canvas.width - 60) + 30;
            
            items.push({
                x: x,
                y: -50,
                emoji: config.emoji,
                speedY: speedY,
                waveOffset: Math.random() * Math.PI * 2,
                width: 40,
                height: 40,
                markedForDeletion: false
            });
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 6 + 2;
                this.speedX = Math.random() * 8 - 4;
                this.speedY = Math.random() * -10 - 2;
                this.color = color || `hsl(${Math.random() * 360}, 100%, 70%)`;
                this.gravity = 0.25;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.015;
            }
            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function spawnLevelUpParticles() {
            for(let i=0; i<100; i++) {
                particles.push(new Particle(canvas.width/2, canvas.height/2));
            }
        }

        function drawPlayer() {
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            ctx.font = '70px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const float = Math.sin(frameCount / 10) * 3;
            ctx.fillText('🧺', player.x + player.width / 2, player.y + player.height / 2 + float);
        }

        function updateGameItems() {
            const config = levels[currentLevel];
            
            items.forEach(item => {
                item.y += item.speedY;
                if (config.wave) {
                    const speedScale = canvas.height / 600;
                    item.x += Math.sin(frameCount / 15 + item.waveOffset) * 5 * speedScale;
                }

                if (
                    item.x + 20 > player.x &&
                    item.x - 20 < player.x + player.width &&
                    item.y + 20 > player.y &&
                    item.y - 20 < player.y + player.height
                ) {
                    item.markedForDeletion = true;
                    score++;
                    scoreDisplay.innerText = `${score} / ${config.target}`;
                    playSound('catch');
                    for(let i=0; i<8; i++) {
                        particles.push(new Particle(item.x, item.y, '#fff'));
                    }
                    if (score >= config.target) {
                        levelUp();
                    }
                }
                if (item.y > canvas.height + 50) {
                    item.markedForDeletion = true;
                }
            });
            items = items.filter(item => !item.markedForDeletion);
            ctx.font = '45px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            items.forEach(item => {
                ctx.save();
                ctx.translate(item.x, item.y);
                ctx.rotate(Math.sin(frameCount / 10 + item.waveOffset) * 0.2);
                ctx.fillText(item.emoji, 0, 0);
                ctx.restore();
            });
        }

        function levelUp() {
            items = [];
            if (currentLevel < 3) {
                currentLevel++;
                score = 0;
                playSound('levelUp');
                spawnLevelUpParticles();
                levelDisplay.innerText = `Level ${currentLevel}`;
                scoreDisplay.innerText = `0 / ${levels[currentLevel].target}`;
                levelToast.innerText = `LEVEL ${currentLevel}`;
                levelToast.classList.remove('hidden');
                levelToast.style.animation = 'none';
                void levelToast.offsetWidth;
                levelToast.style.animation = 'fadeOut 2.5s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            } else {
                gameState = 'end';
                playSound('win');
                spawnLevelUpParticles();
                hudScreen.classList.add('hidden');
                endScreen.classList.remove('hidden');
                setInterval(() => {
                    if (gameState === 'end') {
                        particles.push(new Particle(Math.random() * canvas.width, -10));
                    }
                }, 100);
            }
        }

        function startGame() {
            initAudio();
            gameState = 'play';
            currentLevel = 1;
            score = 0;
            items = [];
            particles = [];
            frameCount = 0;
            player.x = canvas.width / 2 - player.width / 2;
            player.y = canvas.height - 120;
            startScreen.classList.add('hidden');
            endScreen.classList.add('hidden');
            hudScreen.classList.remove('hidden');
            levelDisplay.innerText = `Level 1`;
            scoreDisplay.innerText = `0 / ${levels[1].target}`;
            levelToast.innerText = `LEVEL 1`;
            levelToast.classList.remove('hidden');
            levelToast.style.animation = 'none';
            void levelToast.offsetWidth;
            levelToast.style.animation = 'fadeOut 2.5s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            if (!animationId) {
                gameLoop();
            }
        }

        function gameLoop() {
            ctx.save();
            if (shakeAmount > 0) {
                const sx = (Math.random() - 0.5) * shakeAmount;
                const sy = (Math.random() - 0.5) * shakeAmount;
                ctx.translate(sx, sy);
                shakeAmount *= 0.9;
                if (shakeAmount < 0.1) shakeAmount = 0;
            }
            ctx.clearRect(-10, -10, canvas.width + 20, canvas.height + 20);
            if (gameState === 'play') {
                frameCount++;
                if (keys.ArrowLeft) player.x -= player.speed;
                if (keys.ArrowRight) player.x += player.speed;
                player.y = canvas.height - 120;
                const spawnInterval = canvas.height > 750 ? 40 : 50;
                if (frameCount % spawnInterval === 0) { 
                    spawnItem();
                }
                drawPlayer();
                updateGameItems();
            }
            particles.forEach((p, index) => {
                p.update();
                p.draw();
                if (p.alpha <= 0 || p.y > canvas.height + 20) {
                    particles.splice(index, 1);
                }
            });
            ctx.restore();
            animationId = requestAnimationFrame(gameLoop);
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
